name: Keep API awake

# External safety net that pings the Render health endpoint so the free-tier API
# doesn't spin down and cold-start (a cold start delayed logins). The server also
# self-pings while it's running; this cron can wake it even if it ever does sleep.
#
# Note: GitHub's scheduled runs are best-effort and can be delayed several
# minutes under load, and scheduled workflows auto-disable after ~60 days with no
# repo activity. If the API URL ever changes, update HEALTH_URL below.

on:
  schedule:
    - cron: "*/12 * * * *" # roughly every 12 minutes
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (retry through a cold start)
        env:
          HEALTH_URL: https://oneleet-api.onrender.com/api/health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -m 40 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo 000)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API is awake."
              exit 0
            fi
            sleep 20
          done
          # A cold start can occasionally outlast the retries — don't spam failure
          # emails; the next scheduled run will catch it.
          echo "Did not get 200 this run; will try again next schedule."
          exit 0
