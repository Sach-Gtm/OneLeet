    />
    <link rel="canonical" href="https://www.oneleet.in/" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <meta property="og:type" content="website" />

      property="og:description"
      content="Your diploma-to-B.Tech shortcut. Real past papers, exam-pattern mock tests and AI practice for the Lateral Entry Entrance Test."

    <meta property="og:image" content="https://www.oneleet.in/og-image.png" />

    <!-- Fonts: preconnect + display=swap so text paints immediately (better LCP than @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    />

    <!-- Entity graph: who OneLeet is + site search action. Mirrors the static SEO pages. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "EducationalOrganization",
            "@id": "https://www.oneleet.in/#organization",
            "name": "OneLeet",
            "alternateName": "OneLeet — LEET Preparation",
            "url": "https://www.oneleet.in/",
            "logo": "https://www.oneleet.in/favicon.svg",
            "image": "https://www.oneleet.in/og-image.png",
            "description": "OneLeet is an AI-powered preparation platform for the LEET / Lateral Entry Entrance Test, helping diploma holders get into the 2nd year of B.Tech with real past papers, exam-pattern mock tests, notes and AI practice.",
            "email": "help@oneleet.in",
            "areaServed": "IN",
            "knowsAbout": [
              "LEET",
              "Lateral Entry Entrance Test",
              "Lateral entry into B.Tech",
              "Diploma to B.Tech",
              "Engineering entrance preparation"
            ],
            "parentOrganization": { "@type": "Organization", "name": "StaplerLabs Private Limited" }
          },
          {
            "@type": "WebSite",
            "@id": "https://www.oneleet.in/#website",
            "url": "https://www.oneleet.in/",
            "name": "OneLeet",
            "publisher": { "@id": "https://www.oneleet.in/#organization" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://www.oneleet.in/leet/?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
